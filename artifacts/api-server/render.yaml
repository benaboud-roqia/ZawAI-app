services:
  - type: web
    name: zawia-api
    env: node
    buildCommand: pnpm install --ignore-scripts && pnpm run build
    startCommand: node ./dist/index.mjs
    envVars:
      - key: PORT
        value: 3000
      - key: DATABASE_URL
        sync: false
      - key: AI_INTEGRATIONS_ANTHROPIC_API_KEY
        sync: false
